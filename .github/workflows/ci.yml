name: MLOps CI/CD to Azure

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AZURE_WEBAPP_NAME: football-mlops-app
  DOCKER_IMAGE_NAME: elitescout/football-mlops

jobs:
  build_and_push_container:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to DockerHub
      if: github.ref == 'refs/heads/main' && env.DOCKERHUB_USERNAME != ''
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    # If using Azure Container Registry instead of DockerHub, you would login here like:
    # - name: Log in to ACR
    #   uses: azure/docker-login@v1
    #   with:
    #     login-server: myacr.azurecr.io
    #     username: ${{ secrets.ACR_USERNAME }}
    #     password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: ${{ github.ref == 'refs/heads/main' && env.DOCKERHUB_USERNAME != '' }}
        tags: |
          ${{ env.DOCKER_IMAGE_NAME }}:latest
          ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

  deploy_to_azure:
    needs: build_and_push_container
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
    
    steps:
    - name: Azure Login
      if: env.AZURE_CREDENTIALS != ''
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App for Containers
      if: env.AZURE_CREDENTIALS != ''
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        images: '${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}'

  ml_pipeline_check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install dvc dvc-s3

    - name: Pull Data (DVC)
      run: echo "dvc pull (skipped for local mock)"

    - name: Reproduce ML Pipeline (DVC)
      run: echo "dvc repro (skipped to prevent massive GitHub actions run time without data)"
