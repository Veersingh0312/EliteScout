version: '3.8'

services:
  # Main Football Platform
  app:
    build: .
    container_name: football-app
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
    depends_on:
      - mlflow-server
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./metrics:/app/metrics
      - ./mlruns:/app/mlruns

  # MLflow Tracking Server & UI
  mlflow-server:
    image: python:3.10-slim
    container_name: mlflow-dashboard
    ports:
      - "5050:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    command: >
      sh -c "pip install mlflow==3.10.1 && mlflow db upgrade sqlite:///app/mlflow.db && mlflow server --backend-store-uri sqlite:///app/mlflow.db --default-artifact-root /app/mlruns/ --host 0.0.0.0"

  # Jenkins Local CI/CD
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-ci
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      # Mount docker socket so Jenkins could execute actual docker builds if configured
      - /var/run/docker.sock:/var/run/docker.sock
